{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-warning text-white text-uppercase">
                    <i class="fa fa-edit"></i> Edit Profile
                </div>
                <div class="card-body">
                    <!-- Edit Profile Form -->
                    <form method="POST" action="{{ url_for('vendor.edit_profile') }}">

                        <div class="form-group">
                            <label for="username">Username</label>
                            <input type="text" class="form-control" id="username" name="username" value="{{ user.username }}" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" class="form-control" id="email" name="email" value="{{ user.email }}" required>
                        </div>

                        <div class="form-group">
                            <label for="shop_name">Shop Name</label>
                            <input type="text" class="form-control" id="shop_name" name="shop_name" value="{{ user.shop_name }}" required>
                        </div>

                        <button type="submit" class="btn btn-success btn-block">Save Changes</button>
                    </form>
                    <a href="{{ url_for('vendor.profile') }}" class="btn btn-secondary btn-block mt-3">Back to Profile</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
