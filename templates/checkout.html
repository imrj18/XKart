{% extends 'layout.html' %}
{% block content %}
<section class="jumbotron text-center">
    <div class="container">
        <h1 class="jumbotron-heading">Checkout</h1>
        <p class="lead text-muted">Complete your order</p>
    </div>
</section>

<div class="container">
    <form method="POST" action="{{ url_for('order.checkout') }}">
        <div class="row">
            <!-- Billing Details -->
            <div class="col-md-6">
                <h4>Billing Information</h4>
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" class="form-control" id="fullName" name="full_name" required>
                </div>
                <div class="form-group">
                    <label for="emailAddress">Email</label>
                    <input type="email" class="form-control" id="emailAddress" name="email" required>
                </div>
                <div class="form-group">
                    <label for="address">Address</label>
                    <input type="text" class="form-control" id="address" name="address" required>
                </div>
                <div class="form-group">
                    <label for="city">City</label>
                    <input type="text" class="form-control" id="city" name="city" required>
                </div>
                <div class="form-row">
                    <div class="form-group col-md-6">
                        <label for="state">State</label>
                        <input type="text" class="form-control" id="state" name="state" required>
                    </div>
                    <div class="form-group col-md-6">
                        <label for="zip">Zip</label>
                        <input type="text" class="form-control" id="zip" name="zip" required>
                    </div>
                </div>
            </div>

            <!-- Order Summary -->
            <div class="col-md-6">
                <h4>Your Order</h4>
                <ul class="list-group mb-3">
                    {% for item in cart_items %}
                    <li class="list-group-item d-flex justify-content-between lh-sm">
                        <div>
                            <h6 class="my-0">{{ item.name }}</h6>
                            <small class="text-muted">Qty: {{ item.quantity }}</small>
                        </div>
                        <span class="text-muted">₹{{ item.price * item.quantity }}</span>
                    </li>
                    {% endfor %}
                    <li class="list-group-item d-flex justify-content-between">
                        <strong>Total</strong>
                        <strong>₹{{ total_price }}</strong>
                    </li>
                </ul>

                <!-- Payment Method -->
                <div class="form-group mt-4">
                    <label for="payment_method"><strong>Select Payment Method:</strong></label>
                    <select class="form-control" id="payment_method" name="payment_method" required>
                        <option value="">-- Choose Payment Method --</option>
                        <option value="cod">Cash on Delivery</option>
                        <option value="credit_card">Credit/Debit Card</option>
                        <option value="upi">UPI</option>
                        <option value="net_banking">Net Banking</option>
                    </select>
                </div>

                <button type="submit" class="btn btn-success btn-block">Place Order</button>
            </div>
        </div>
    </form>
</div>
{% endblock %}
