{% extends "layout.html" %}

{% block head %}
    <style>
        .product-list {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 0 auto;
            padding: 20px;
        }

        .product-item {
            background-color: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            width: 250px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .product-item img {
            width: 100%;
            height: auto;
            max-height: 200px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .product-item:hover {
            transform: translateY(-5px); /* Slight upward movement on hover */
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1); /* Increased shadow on hover */
        }

        .product-item h3 {
            font-size: 1.2em;
            color: #333;
            margin-bottom: 10px;
        }

        .product-item p {
            font-size: 1em;
            color: #555;
            margin-bottom: 10px;
        }

        .product-item .price {
            font-size: 1.1em;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 15px;
        }

        .product-item a {
            color: #fff;
            background-color: #28a745;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.1em;
            transition: background-color 0.3s ease;
        }

        .product-item a:hover {
            background-color: #218838; /* Darker green on hover */
        }
    </style>
{% endblock %}

{% block content %}
    <h2 style="text-align: center; font-size: 2em; color: #333; margin-bottom: 20px;">Products in "{{ category.name }}"</h2>
    <div class="product-list">
        {% for product in products %}
            <div class="product-item">
                <!-- Display product image -->
                <img src="{{ product.image_url }}" alt="{{ product.name }}">

                <!-- Product name -->
                <h3>{{ product.name }}</h3>

                <!-- Product description -->
                <p>{{ product.description }}</p>

                <!-- Product price -->
                <p class="price">Price: ${{ product.price }}</p>

                <!-- View details button -->
                <a href="{{ url_for('product.product_detail', product_id=product.id) }}">View Details</a>
            </div>
        {% endfor %}
    </div>
{% endblock %}
