{% extends "layout.html" %}
{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-primary text-white text-uppercase">
                    <i class="fa fa-user-edit"></i> Edit Profile
                </div>
                <div class="card-body">
                    <!-- Edit Profile Form -->
                    <form method="POST" action="{{ url_for('auth.edit_profile') }}">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" class="form-control" id="name" name="name" value="{{ current_user.username }}" required>
                        </div>

                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" class="form-control" id="city" name="city" value="{{ current_user.city }}" required>
                        </div>

                        <div class="form-group">
                            <label for="area">Area</label>
                            <input type="text" class="form-control" id="area" name="area" value="{{ current_user.area }}" required>
                        </div>

                        <button type="submit" class="btn btn-success btn-block">Save Changes</button>
                    </form>

                    <!-- Flash messages -->
                    {% with messages = get_flashed_messages(with_categories=true) %}
                        {% if messages %}
                            <ul class="list-group mt-3">
                                {% for category, message in messages %}
                                    <li class="list-group-item text-{{ category }}">{{ message }}</li>
                                {% endfor %}
                            </ul>
                        {% endif %}
                    {% endwith %}

                    <a href="{{ url_for('auth.dashboard') }}" class="btn btn-secondary btn-block mt-3">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
