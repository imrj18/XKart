{% extends "layout.html" %}
{% block content %}
<div class="container mt-4">
    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="card">
                <div class="card-header bg-warning text-white text-uppercase">
                    <i class="fa fa-key"></i> Change Password
                </div>
                <div class="card-body">
                    <!-- Change Password Form -->
                    <form method="POST" action="{{ url_for('auth.change_password') }}">
                        <div class="form-group">
                            <label for="old_password">Old Password</label>
                            <input type="password" class="form-control" id="old_password" name="old_password" required>
                        </div>

                        <div class="form-group">
                            <label for="new_password">New Password</label>
                            <input type="password" class="form-control" id="new_password" name="new_password" required>
                        </div>

                        <div class="form-group">
                            <label for="confirm_password">Confirm New Password</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_new_password" required>
                        </div>

                        <button type="submit" class="btn btn-success btn-block">Change Password</button>
                    </form>
                    {% with messages = get_flashed_messages(with_categories=true) %}
                            {% if messages %}
                                <ul class="list-group mt-3">
                                    {% for category, message in messages %}
                                        <li class="list-group-item text-{{ category }}">{{ message }}</li>
                                    {% endfor %}
                                </ul>
                            {% endif %}
                        {% endwith %}
                    <a href="{{ url_for('auth.dashboard') }}" class="btn btn-secondary btn-block mt-3">Back to Dashboard</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
