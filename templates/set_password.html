{% extends "layout.html" %}
{% block content %}

<section class="jumbotron text-center">
    <div class="container">
        <h1 class="jumbotron-heading">Set Your Password</h1>
        <p class="lead text-muted mb-0">Complete your account setup</p>
    </div>
</section>

<div class="container">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
            {{ message }}
            <button type="button" class="close" data-dismiss="alert" aria-label="Close">
              <span aria-hidden="true">&times;</span>
            </button>
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <div class="row">
        <div class="col-md-6 offset-md-3">
            <form method="POST" action="{{ url_for('auth.set_password') }}">
                <div class="form-group">
                    <label for="password">New Password</label>
                    <input type="password" class="form-control" name="password" placeholder="Enter password" required>
                </div>
                <div class="form-group">
                    <label for="confirm_password">Confirm Password</label>
                    <input type="password" class="form-control" name="confirm_password" placeholder="Confirm password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Set Password</button>
            </form>
        </div>
    </div>
</div>

{% endblock %}
